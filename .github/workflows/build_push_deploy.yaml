name: CI/CD Workflow (build, push, and deploy)

on:
  push:
    branches:
      - main
    paths:
      - "Application/**"
      - "Kubernetes/**"
      - "Foundation/**"
      - "Helm/**"
      - ".github/workflows/**"
      - "!Application/README.md"
      - "!Application/docker-compose.yaml"
      - "!Kubernetes/README.md"

env:
  FRONT_WORKING_DIRECTORY: Application/frontend
  API_WORKING_DIRECTORY: Application/backend
  CONSUMER_WORKING_DIRECTORY: Application/consumer
  # Use GitHub Container Registry (GHCR) and Git SHA for tagging
  FRONT_LOCATION: ghcr.io/noureddine-t/calculatrice-front:${{ github.sha }}
  API_LOCATION: ghcr.io/noureddine-t/calculatrice-api:${{ github.sha }}
  CONSUMER_LOCATION: ghcr.io/noureddine-t/calculatrice-consumer:${{ github.sha }}

  REDIS_PATH: Kubernetes/redis
  RABBITMQ_PATH: Kubernetes/rabbitMQ
  FRONT_PATH: Kubernetes/front
  NGINX_INGRESS_PATH: "Kubernetes/ingress-nginx"
  API_PATH: Kubernetes/api
  CONSUMER_PATH: Kubernetes/consumer
  NAMESPACE: taleb

jobs:
  build-and-push-front:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (pour architecture ARM)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Frontend (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONT_WORKING_DIRECTORY }}
          push: true
          platforms: linux/arm64
          tags: ${{ env.FRONT_LOCATION }}

  build-and-push-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.API_WORKING_DIRECTORY }}
          push: true
          platforms: linux/arm64
          tags: ${{ env.API_LOCATION }}

  build-and-push-consumer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Consumer (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONSUMER_WORKING_DIRECTORY }}
          push: true
          platforms: linux/arm64
          tags: ${{ env.CONSUMER_LOCATION }}

  deploy-with-kubernetes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build-and-push-front, build-and-push-api, build-and-push-consumer]
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v4"

      - name: "Create .kube directory"
        run: mkdir -p $HOME/.kube

      - name: "Set up Kubernetes configuration"
        run: |
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update Helm values.yaml with new tags and push to Git
        run: |
          # Installation de yq pour manipuler le YAML facilement
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod a+x /usr/local/bin/yq

          # Mise à jour du tag dans values.yaml
          yq e '.image.tag = "${{ github.sha }}"' -i Helm/calculatrice/values.yaml

          # Commit et push (avec [skip ci] pour éviter une boucle infinie de workflows)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Helm/calculatrice/values.yaml
          git commit -m "chore: update docker tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push

      - name: "Bootstrap ArgoCD and apply dependencies"
        run: |
          # Installer cert-manager (pour HTTPS) car ArgoCD gère l'application, pas les certs globaux
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.1/cert-manager.yaml
          
          # Initialiser l'application ArgoCD (GitOps)
          kubectl apply -f GitOps/argocd-app.yaml