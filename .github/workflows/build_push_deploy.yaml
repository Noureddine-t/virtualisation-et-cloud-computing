name: CI/CD Workflow (build, push, and deploy)

on:
  push:
    branches:
      - main
    paths:
      - "Application/**"
      - "Kubernetes/**"
      - "Foundation/**"
      - "Helm/**"
      - ".github/workflows/**"
      - "!Application/README.md"
      - "!Application/docker-compose.yaml"
      - "!Kubernetes/README.md"

env:
  FRONT_WORKING_DIRECTORY: Application/frontend
  API_WORKING_DIRECTORY: Application/backend
  CONSUMER_WORKING_DIRECTORY: Application/consumer
  # Use GitHub Container Registry (GHCR)
  FRONT_LOCATION: ghcr.io/noureddine-t/calculatrice-front:latest
  API_LOCATION: ghcr.io/noureddine-t/calculatrice-api:latest
  CONSUMER_LOCATION: ghcr.io/noureddine-t/calculatrice-consumer:latest

  REDIS_PATH: Kubernetes/redis
  RABBITMQ_PATH: Kubernetes/rabbitMQ
  FRONT_PATH: Kubernetes/front
  NGINX_INGRESS_PATH: "Kubernetes/ingress-nginx"
  API_PATH: Kubernetes/api
  CONSUMER_PATH: Kubernetes/consumer
  NAMESPACE: taleb

jobs:
  build-and-push-front:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (pour architecture ARM)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Frontend (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONT_WORKING_DIRECTORY }}
          push: true
          platforms: linux/arm64
          tags: ${{ env.FRONT_LOCATION }}

  build-and-push-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.API_WORKING_DIRECTORY }}
          push: true
          platforms: linux/arm64
          tags: ${{ env.API_LOCATION }}

  build-and-push-consumer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Consumer (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONSUMER_WORKING_DIRECTORY }}
          push: true
          platforms: linux/arm64
          tags: ${{ env.CONSUMER_LOCATION }}

  deploy-with-kubernetes:
    runs-on: ubuntu-latest
    needs: [build-and-push-front, build-and-push-api, build-and-push-consumer]
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v4"

      - name: "Create .kube directory"
        run: mkdir -p $HOME/.kube

      - name: "Set up Kubernetes configuration"
        run: |
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: "Deploy to Kubernetes"
        run: |
          # Installer cert-manager (pour HTTPS)
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.1/cert-manager.yaml
          sleep 20 # Attendre que les webhooks de cert-manager soient prêts
          
          # Déployer l'application avec Helm
          helm upgrade --install calculatrice ./Helm/calculatrice --namespace ${{ env.NAMESPACE }} --create-namespace