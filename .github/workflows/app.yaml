name: Application CI/CD (Build & Update Helm)

on:
  push:
    branches:
      - main
    paths:
      - "Application/**"
      - "Helm/**"
      - ".github/workflows/app.yaml"

env:
  FRONT_WORKING_DIRECTORY: Application/frontend
  API_WORKING_DIRECTORY: Application/backend
  CONSUMER_WORKING_DIRECTORY: Application/consumer
  FRONT_LOCATION: ghcr.io/noureddine-t/calculatrice-front:${{ github.sha }}
  API_LOCATION: ghcr.io/noureddine-t/calculatrice-api:${{ github.sha }}
  CONSUMER_LOCATION: ghcr.io/noureddine-t/calculatrice-consumer:${{ github.sha }}

jobs:
  # Étape 1 : Détecter quels dossiers ont été modifiés
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      consumer: ${{ steps.filter.outputs.consumer }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'Application/frontend/**'
            backend:
              - 'Application/backend/**'
            consumer:
              - 'Application/consumer/**'
            helm:
              - 'Helm/**'

  build-and-push-front:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONT_WORKING_DIRECTORY }}
          push: true
          platforms: linux/arm64
          tags: ${{ env.FRONT_LOCATION }}

  build-and-push-api:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.API_WORKING_DIRECTORY }}
          push: true
          platforms: linux/arm64
          tags: ${{ env.API_LOCATION }}

  build-and-push-consumer:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.consumer == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Consumer
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONSUMER_WORKING_DIRECTORY }}
          push: true
          platforms: linux/arm64
          tags: ${{ env.CONSUMER_LOCATION }}

  update-helm-and-gitops:
    needs: [detect-changes, build-and-push-front, build-and-push-api, build-and-push-consumer]
    # S'exécute toujours, même si un build a été skippé (tant qu'aucun n'a échoué)
    if: |
      always() && 
      (needs.build-and-push-front.result == 'success' || needs.build-and-push-front.result == 'skipped') &&
      (needs.build-and-push-api.result == 'success' || needs.build-and-push-api.result == 'skipped') &&
      (needs.build-and-push-consumer.result == 'success' || needs.build-and-push-consumer.result == 'skipped') &&
      (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.consumer == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update Helm values.yaml with new tags
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod a+x /usr/local/bin/yq
          yq e '.image.tag = "${{ github.sha }}"' -i Helm/calculatrice/values.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Helm/calculatrice/values.yaml
          git commit -m "chore: update docker tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
