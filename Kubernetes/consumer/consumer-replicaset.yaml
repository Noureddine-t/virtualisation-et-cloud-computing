apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: consumer-replicaset
  labels:
    app: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
        - name: consumer-container
          image: ghcr.io/noureddine-t/calculatrice-consumer:latest
          resources:
            requests:
              cpu: 50m
              memory: 56Mi