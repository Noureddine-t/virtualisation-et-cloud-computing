apiVersion: v1
kind: Service
metadata:
  name: svc-rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      protocol: TCP
      port: {{ .Values.rabbitmq.amqpPort }}
      targetPort: 5672
    - name: management
      protocol: TCP
      port: {{ .Values.rabbitmq.managementPort }}
      targetPort: 15672
  type: ClusterIP
